---
# Install the hourly auto-deploy cron on prod origins. Run once per box
# (and re-run after any change to autodeploy.sh / the cron schedule).
#
#   cd infrastructure/ansible
#   ./bin/do-ansible playbooks/install-autodeploy.yml
#
# Prereqs:
#   - CF_TOKEN + CF_ZONE need to be in 1Password at
#     op://Spire Codex/Cloudflare/API Token and op://Spire Codex/Cloudflare/Zone ID
#   - The wrapper resolves them at runtime; the box only ever sees the
#     rendered cf-purge.env, never the 1P references.

- name: Install hourly auto-deploy cron + CF purge env
  hosts: prod_origins
  gather_facts: false
  vars:
    autodeploy_script: /usr/local/bin/spire-codex-autodeploy
    cron_file: /etc/cron.d/spire-codex-autodeploy
    cf_env_dir: /etc/spire-codex
    cf_env_file: /etc/spire-codex/cf-purge.env
  tasks:
    - name: Copy autodeploy script
      become: true
      copy:
        src: ../files/autodeploy.sh
        dest: "{{ autodeploy_script }}"
        mode: "0755"
        owner: root
        group: root

    - name: Install cron entry
      become: true
      copy:
        src: ../files/spire-codex-autodeploy.cron
        dest: "{{ cron_file }}"
        mode: "0644"
        owner: root
        group: root

    - name: Ensure CF env dir exists
      become: true
      file:
        path: "{{ cf_env_dir }}"
        state: directory
        mode: "0700"
        owner: root
        group: root

    # The CF token + zone live in 1Password. We render them onto the box
    # in a 0600 file readable only by root. If you ever rotate the token,
    # update 1Password and re-run this playbook — the autodeploy itself
    # never touches 1P (Touch ID would kill unattended runs).
    - name: Render CF purge env
      become: true
      copy:
        content: |
          # Auto-generated by install-autodeploy.yml. Do not edit by hand —
          # changes get overwritten on the next playbook run. Update the
          # source in 1Password and re-run the playbook.
          CF_TOKEN="{{ lookup('env', 'CF_TOKEN') }}"
          CF_ZONE="{{ lookup('env', 'CF_ZONE') }}"
        dest: "{{ cf_env_file }}"
        mode: "0600"
        owner: root
        group: root
      no_log: true

    - name: Confirm cron installed
      become: true
      command: ls -la "{{ cron_file }}" "{{ autodeploy_script }}"
      register: install_check
      changed_when: false

    - name: Summary
      debug:
        msg: |
          ✓ Auto-deploy installed. Will fire :03 every hour.
          Manual trigger: ssh box && sudo /usr/local/bin/spire-codex-autodeploy
          Logs:           /var/log/spire-codex-autodeploy.log
