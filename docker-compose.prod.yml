name: spire-codex

services:
  backend:
    image: ptrlrd/spire-codex-backend:latest
    container_name: spire-codex-backend
    # Multiple workers so a burst of POST /api/runs (Overwolf launch
    # backfills) doesn't serialise behind a single thread and block
    # everything else (GET /api/runs/stats, /api/runs/list etc.).
    #
    # The shell wrapper sets up prometheus_client's multiprocess
    # collector dir before uvicorn forks workers: each worker writes
    # its counters into per-pid files under PROMETHEUS_MULTIPROC_DIR,
    # and /metrics aggregates across them. Without this, each scrape
    # returns one random worker's view, which Prometheus reads as a
    # counter reset on every cross-worker bounce — `rate()` then
    # multiplies by 4-ish and dashboards show wildly inflated traffic.
    # The dir must be empty at boot so we don't include stale files
    # from previously-exited worker pids.
    command:
      - sh
      - -c
      - >-
        mkdir -p "$$PROMETHEUS_MULTIPROC_DIR" &&
        rm -rf "$$PROMETHEUS_MULTIPROC_DIR"/* &&
        exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    volumes:
      - ./data:/data
      - ./.secrets:/secrets:ro
    environment:
      - DATA_DIR=/data
      - FEEDBACK_WEBHOOK_URL=${FEEDBACK_WEBHOOK_URL:-}
      - GUIDE_WEBHOOK_URL=${GUIDE_WEBHOOK_URL:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - UNINSTALL_FROM=${UNINSTALL_FROM:-}
      - UNINSTALL_FEEDBACK_TO=${UNINSTALL_FEEDBACK_TO:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - GITHUB_APP_ID=${GITHUB_APP_ID:-}
      - GITHUB_APP_INSTALLATION_ID=${GITHUB_APP_INSTALLATION_ID:-}
      - GITHUB_APP_REPO=${GITHUB_APP_REPO:-}
      - GITHUB_APP_PRIVATE_KEY_PATH=${GITHUB_APP_PRIVATE_KEY_PATH:-/secrets/knowledge-demon.private-key.pem}
      # Card-render QA mount. Set to /data/qa once the rendered PNGs +
      # index.html are rsync'd onto the host volume. Empty/missing →
      # the /qa endpoint isn't registered.
      - QA_DIR=${QA_DIR:-}
      # Turso (libSQL) — retired post-Overwolf-launch (round-trip per
      # write was untenable under burst). Hardcoded empty so the
      # libsql path stays off.
      - TURSO_URL=
      - TURSO_AUTH_TOKEN=
      - TURSO_LOCAL_REPLICA=
      # MongoDB — when MONGO_URL is set, runs_db.py uses the Mongo
      # path. Falls through to local /data/runs.db SQLite otherwise
      # (the current state while the migration is in progress).
      - MONGO_URL=${MONGO_URL:-}
      # prometheus_client multiprocess mode. Set in the env (not the
      # CMD) so it's exported into every worker as a real env var
      # before prometheus_client is imported. The dir is recreated +
      # cleaned by the CMD shell wrapper above.
      #
      # Side effect: prometheus_client disables its built-in per-process
      # collectors (process_cpu_seconds_total, process_resident_memory_bytes,
      # gc, platform) under multiproc, because they only make sense
      # per-pid. Any Grafana panel reading those metrics must switch
      # to node_exporter (`node_cpu_*`, `node_memory_*`) or cAdvisor
      # (`container_cpu_*`, `container_memory_*`).
      - PROMETHEUS_MULTIPROC_DIR=/tmp/prom_multiproc
    networks:
      - nginx_web-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  frontend:
    image: ptrlrd/spire-codex-frontend:latest
    container_name: spire-codex-frontend
    depends_on:
      - backend
    volumes:
      - ./data:/data:ro
    environment:
      - API_INTERNAL_URL=http://spire-codex-backend:8000
      - NEXT_PUBLIC_SITE_URL=https://spire-codex.com
      # Self-hosted Umami tracker. Read by app/layout.tsx at SSR time
      # — no rebuild needed when these values change. Leaving either
      # blank keeps the analytics script off the page entirely.
      - UMAMI_SRC=${UMAMI_SRC:-}
      - UMAMI_WEBSITE_ID=${UMAMI_WEBSITE_ID:-}
    networks:
      - nginx_web-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  nginx_web-network:
    external: true
