name: spire-codex

services:
  backend:
    image: ptrlrd/spire-codex-backend:latest
    container_name: spire-codex-backend
    volumes:
      - ./data:/data
      - ./.secrets:/secrets:ro
    environment:
      - DATA_DIR=/data
      - FEEDBACK_WEBHOOK_URL=${FEEDBACK_WEBHOOK_URL:-}
      - GUIDE_WEBHOOK_URL=${GUIDE_WEBHOOK_URL:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - UNINSTALL_FROM=${UNINSTALL_FROM:-}
      - UNINSTALL_FEEDBACK_TO=${UNINSTALL_FEEDBACK_TO:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - GITHUB_APP_ID=${GITHUB_APP_ID:-}
      - GITHUB_APP_INSTALLATION_ID=${GITHUB_APP_INSTALLATION_ID:-}
      - GITHUB_APP_REPO=${GITHUB_APP_REPO:-}
      - GITHUB_APP_PRIVATE_KEY_PATH=${GITHUB_APP_PRIVATE_KEY_PATH:-/secrets/knowledge-demon.private-key.pem}
      # Card-render QA mount. Set to /data/qa once the rendered PNGs +
      # index.html are rsync'd onto the host volume. Empty/missing →
      # the /qa endpoint isn't registered.
      - QA_DIR=${QA_DIR:-}
      # Turso (libSQL) — services/runs_db.py uses Turso when TURSO_URL
      # is set, falls back to local SQLite otherwise. Empty defaults
      # mean a host with no .env entry stays on the legacy local path.
      - TURSO_URL=${TURSO_URL:-}
      - TURSO_AUTH_TOKEN=${TURSO_AUTH_TOKEN:-}
      # Embedded replica mode: when set to a path on the mounted /data
      # volume, libsql keeps a local SQLite copy of the Turso DB and
      # syncs it in the background. All reads hit the local file (no
      # Turso row-reads metered), writes still go to Turso. Empty/
      # missing → direct mode (the original behaviour). Opt-in via .env
      # so the flip is explicit per host:
      #   TURSO_LOCAL_REPLICA=/data/runs-replica.db
      - TURSO_LOCAL_REPLICA=${TURSO_LOCAL_REPLICA:-}
    networks:
      - nginx_web-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  frontend:
    image: ptrlrd/spire-codex-frontend:latest
    container_name: spire-codex-frontend
    depends_on:
      - backend
    volumes:
      - ./data:/data:ro
    environment:
      - API_INTERNAL_URL=http://spire-codex-backend:8000
      - NEXT_PUBLIC_SITE_URL=https://spire-codex.com
    networks:
      - nginx_web-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  nginx_web-network:
    external: true
