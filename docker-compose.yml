name: spire-codex

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - ./backend/static:/app/static:ro
      - ./.secrets:/secrets:ro
    environment:
      - DATA_DIR=/data
      # Credentialed requests (auth cookie on /api/auth/me etc.) need a
      # specific origin, not the wildcard fallback. Without this the backend
      # sends `Access-Control-Allow-Origin: *`, which browsers reject for
      # credentialed requests (Firefox especially), breaking the account menu.
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      - FEEDBACK_WEBHOOK_URL=${FEEDBACK_WEBHOOK_URL:-}
      - GUIDE_WEBHOOK_URL=${GUIDE_WEBHOOK_URL:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - GITHUB_APP_ID=${GITHUB_APP_ID:-}
      - GITHUB_APP_INSTALLATION_ID=${GITHUB_APP_INSTALLATION_ID:-}
      - GITHUB_APP_REPO=${GITHUB_APP_REPO:-}
      - GITHUB_APP_PRIVATE_KEY_PATH=${GITHUB_APP_PRIVATE_KEY_PATH:-/secrets/knowledge-demon.private-key.pem}
      # Application cache (issue #388). Unset -> every cache call no-ops and
      # the existing data paths run unchanged.
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      - redis
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    # Cache only: hard memory cap with LRU eviction, no persistence.
    # Everything in here is rebuildable from Mongo / the run files on miss.
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --appendonly no --save ""
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        # Local static/ only ships .png originals; the API serves .webp paths
        # that live on the CDN. Without this, imageUrl() falls back to the
        # backend and every image 404s. CI bakes the same value (ci.yml).
        NEXT_PUBLIC_CDN_URL: https://cdn.spire-codex.com
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data:ro
    environment:
      - HOSTNAME=0.0.0.0
      # Server-side data fetches (tier list, etc.) must reach the backend over
      # the compose network, not localhost (which is the frontend container).
      - API_INTERNAL_URL=http://backend:8000
    depends_on:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
