name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  # ── Secrets check ──────────────────────────────────────
  secrets-check:
    name: Scan for secrets
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog secret scan
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE:/repo:ro" trufflesecurity/trufflehog:latest \
            filesystem /repo --only-verified --fail

  # ── Frontend checks ────────────────────────────────────
  frontend-lint:
    name: Frontend lint & type-check
    runs-on: self-hosted
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          # No `cache: npm` here on purpose. Self-hosted runners give
          # us free compute, but setup-node's npm cache still uploads
          # ~/.npm to GitHub-managed storage (Next.js + sharp + swc
          # cross-platform binaries makes it ~350 MiB per cache, and
          # we'd blow through the 500 MiB plan quota with one cache on
          # main and another on a feature branch). The runner has fast
          # internet — `npm ci` re-fetching costs ~30s vs paying for
          # storage overage. If we ever need this back, store the
          # cache on the runner host (persistent volume) instead of
          # uploading it.

      - run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript type-check
        run: npx tsc --noEmit

  # ── Backend checks ─────────────────────────────────────
  backend-lint:
    name: Backend lint
    runs-on: self-hosted
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Ruff lint
        run: ruff check app/

      - name: Ruff format check
        run: ruff format --check app/

  # ── Build & Push stable (main only) ─────────────────────
  build-stable:
    name: Build & push stable images
    runs-on: self-hosted
    needs: [secrets-check, frontend-lint, backend-lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend (stable)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          cache-from: type=registry,ref=ptrlrd/spire-codex-backend:buildcache
          cache-to: type=registry,ref=ptrlrd/spire-codex-backend:buildcache,mode=max
          tags: |
            ptrlrd/spire-codex-backend:latest
            ptrlrd/spire-codex-backend:${{ github.sha }}

      - name: Build & push frontend (stable)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          cache-from: type=registry,ref=ptrlrd/spire-codex-frontend:buildcache
          cache-to: type=registry,ref=ptrlrd/spire-codex-frontend:buildcache,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=
            NEXT_PUBLIC_SITE_URL=https://spire-codex.com
            NEXT_PUBLIC_UMAMI_WEBSITE_ID=${{ secrets.UMAMI_WEBSITE_ID }}
          tags: |
            ptrlrd/spire-codex-frontend:latest
            ptrlrd/spire-codex-frontend:${{ github.sha }}

  # ── Build & Push beta (main only) ──────────────────────
  build-beta:
    name: Build & push beta images
    runs-on: self-hosted
    needs: [secrets-check, frontend-lint, backend-lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend (beta)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          cache-from: type=registry,ref=ptrlrd/spire-codex-backend:buildcache-beta
          cache-to: type=registry,ref=ptrlrd/spire-codex-backend:buildcache-beta,mode=max
          tags: |
            ptrlrd/spire-codex-backend:beta
            ptrlrd/spire-codex-backend:beta-${{ github.sha }}

      - name: Build & push frontend (beta)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          cache-from: type=registry,ref=ptrlrd/spire-codex-frontend:buildcache-beta
          cache-to: type=registry,ref=ptrlrd/spire-codex-frontend:buildcache-beta,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=
            NEXT_PUBLIC_SITE_URL=https://beta.spire-codex.com
            NEXT_PUBLIC_UMAMI_WEBSITE_ID=${{ secrets.UMAMI_BETA_WEBSITE_ID }}
          tags: |
            ptrlrd/spire-codex-frontend:beta
            ptrlrd/spire-codex-frontend:beta-${{ github.sha }}

  # ── Build & Push staging (staging branch only) ─────────
  build-staging:
    name: Build & push staging images
    runs-on: self-hosted
    needs: [secrets-check, frontend-lint, backend-lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend (staging)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          cache-from: type=registry,ref=ptrlrd/spire-codex-backend:buildcache-staging
          cache-to: type=registry,ref=ptrlrd/spire-codex-backend:buildcache-staging,mode=max
          tags: |
            ptrlrd/spire-codex-backend:staging
            ptrlrd/spire-codex-backend:staging-${{ github.sha }}

      - name: Build & push frontend (staging)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          cache-from: type=registry,ref=ptrlrd/spire-codex-frontend:buildcache-staging
          cache-to: type=registry,ref=ptrlrd/spire-codex-frontend:buildcache-staging,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=
            NEXT_PUBLIC_SITE_URL=https://staging.spire-codex.com
            NEXT_PUBLIC_CDN_URL=https://cdn.spire-codex.com
          tags: |
            ptrlrd/spire-codex-frontend:staging
            ptrlrd/spire-codex-frontend:staging-${{ github.sha }}

  # ── Deploy ──────────────────────────────────────────────
  # Deploys are intentionally MANUAL via Ansible until we wire the
  # toolkit into CI properly (needs a runner with SSH key + 1Password
  # access, which we don't have yet).
  #
  # After this workflow's build jobs publish new images to Docker Hub,
  # run from your laptop:
  #
  #   cd infrastructure/ansible
  #   ./bin/op-ansible playbooks/deploy.yml          # both prod origins
  #   ./bin/op-ansible playbooks/deploy.yml -e compose_file=docker-compose.beta.yml
  #
  # Ansible's deploy.yml hits BOTH origins (the old GHA step only hit
  # one), does a git pull so docker-compose.prod.yml stays in sync,
  # and confirms the QA mount + "API ready" log lines after restart.
