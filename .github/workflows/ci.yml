name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Supersede in-flight runs when a PR gets a new push; never cancel main
# (a cancelled build job could leave :latest and :sha tags half-pushed).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # ── What changed? ──────────────────────────────────────
  # Data-only pushes (beta-watch auto-PRs, news refreshes, game-data
  # updates) skip lint and image builds entirely: data/ and data-beta/
  # are volume-mounted on the server and arrive via git pull at deploy,
  # so no image contains them.
  changes:
    name: Detect changed areas
    runs-on: self-hosted
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'

  # ── Secrets check ──────────────────────────────────────
  secrets-check:
    name: Scan for secrets
    runs-on: self-hosted
    steps:
      # Shallow checkout: trufflehog scans the working tree (filesystem
      # mode), so full history only inflated the .git dir it walks.
      - uses: actions/checkout@v4

      - name: TruffleHog secret scan
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE:/repo:ro" trufflesecurity/trufflehog:latest \
            filesystem /repo --only-verified --fail

  # ── Frontend checks ────────────────────────────────────
  frontend-lint:
    name: Frontend lint & type-check
    runs-on: self-hosted
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          # No `cache: npm` here on purpose. Self-hosted runners give
          # us free compute, but setup-node's npm cache still uploads
          # ~/.npm to GitHub-managed storage (Next.js + sharp + swc
          # cross-platform binaries makes it ~350 MiB per cache, and
          # we'd blow through the 500 MiB plan quota with one cache on
          # main and another on a feature branch). The runner has fast
          # internet — `npm ci` re-fetching costs ~30s vs paying for
          # storage overage, and the runner's own ~/.npm persists
          # between runs anyway.

      - run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript type-check
        run: npx tsc --noEmit

  # ── Backend checks ─────────────────────────────────────
  backend-lint:
    name: Backend lint
    runs-on: self-hosted
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Ruff lint
        run: ruff check app/

      - name: Ruff format check
        run: ruff format --check app/

  # ── Build & Push (main only) ─────────────────────────────
  # One channel only: the beta site merged into the main deployment
  # (served at /beta from the same containers), so the old build-beta
  # job and its :beta image tags are retired.
  build-stable:
    name: Build & push images
    runs-on: self-hosted
    needs: [changes, secrets-check, frontend-lint, backend-lint]
    # Skipped lint jobs (data-only or single-sided changes) shouldn't
    # block the build of the side that DID change, hence the explicit
    # result checks instead of plain `needs` gating.
    if: >
      !cancelled() &&
      github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      needs.secrets-check.result == 'success' &&
      (needs.frontend-lint.result == 'success' || needs.frontend-lint.result == 'skipped') &&
      (needs.backend-lint.result == 'success' || needs.backend-lint.result == 'skipped') &&
      (needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend
        if: needs.changes.outputs.backend == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          cache-from: type=registry,ref=ptrlrd/spire-codex-backend:buildcache
          cache-to: type=registry,ref=ptrlrd/spire-codex-backend:buildcache,mode=max
          tags: |
            ptrlrd/spire-codex-backend:latest
            ptrlrd/spire-codex-backend:${{ github.sha }}

      - name: Build & push frontend
        if: needs.changes.outputs.frontend == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          cache-from: type=registry,ref=ptrlrd/spire-codex-frontend:buildcache
          cache-to: type=registry,ref=ptrlrd/spire-codex-frontend:buildcache,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=
            NEXT_PUBLIC_SITE_URL=https://spire-codex.com
            NEXT_PUBLIC_UMAMI_WEBSITE_ID=${{ secrets.UMAMI_WEBSITE_ID }}
            NEXT_PUBLIC_CDN_URL=https://cdn.spire-codex.com
          tags: |
            ptrlrd/spire-codex-frontend:latest
            ptrlrd/spire-codex-frontend:${{ github.sha }}

  # ── Deploy ──────────────────────────────────────────────
  # Deploys are intentionally MANUAL via Ansible until we wire the
  # toolkit into CI properly (needs a runner with SSH key + 1Password
  # access, which we don't have yet). The hourly autodeploy cron on the
  # box also picks up merged changes on its own.
  #
  # After this workflow's build job publishes new images to Docker Hub,
  # run from your laptop:
  #
  #   cd infrastructure/ansible
  #   ./bin/op-ansible playbooks/deploy.yml          # both prod origins
  #
  # Ansible's deploy.yml hits BOTH origins (the old GHA step only hit
  # one), does a git pull so docker-compose.prod.yml stays in sync,
  # and confirms the QA mount + "API ready" log lines after restart.
